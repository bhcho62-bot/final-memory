<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>암기력 훈련 v4.5 - Simple Choice</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        #app { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .hidden { display: none !important; }
        .vol-fixed { background: #e9ecef; padding: 10px; border-radius: 10px; margin-bottom: 20px; text-align: left; font-size: 0.9rem; }
        .panel { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; }
        #countdown { font-size: 8rem; color: #228be6; font-weight: bold; margin: 30px 0; }
        button { width: 100%; padding: 18px; font-size: 1.1rem; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; background: #228be6; color: white; }
        button:hover { background: #1c7ed6; }
        .btn-mic { background: #f03e3e; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-mic.recording { background: #ff922b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .btn-next { background: #40c057; margin-top: 10px; }
        .btn-cancel { background: #868e96; margin-top: 20px; font-size: 0.9rem; padding: 12px; }
        textarea { width: 100%; height: 100px; margin-top: 10px; box-sizing: border-box; font-size: 1.1rem; padding: 10px; border: 2px solid #ddd; border-radius: 10px; }
        .round-badge { background: #e7f5ff; color: #1971c2; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        .word-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .word-tile { background: #f1f3f5; padding: 15px 5px; border-radius: 10px; cursor: pointer; font-weight: 500; border: 2px solid transparent; transition: 0.1s; font-size: 0.9rem; }
        .word-tile.selected { background: #e7f5ff; border-color: #228be6; color: #228be6; font-weight: bold; }
        .score-summary { background: #e7f5ff; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; border: 1px solid #1971c2; }
        .history-list { max-height: 150px; overflow-y: auto; font-size: 0.85rem; background: #fff; border: 1px solid #ddd; border-radius: 10px; text-align: left; }
        .history-item { padding: 10px; border-bottom: 1px solid #eee; display: grid; grid-template-columns: 1fr 2fr; }
    </style>
</head>
<body>

<div id="app">
    <div class="vol-fixed">
        <label>📢 음량 조절</label>
        <input type="range" id="vol" min="0" max="1" step="0.1" value="0.7" style="width:100%" oninput="updateVol(this.value)">
    </div>

    <div id="round-badge" class="round-badge">훈련 설정</div>
    <h2 id="main-title">🧠 암기력 훈련 v4.5</h2>

    <div id="screens">
        <div id="step-setup">
            <div class="panel">
                <div class="option-item"><label>🎯 단어 수</label>
                    <select id="wCount" style="width:100%">
                        <option value="5">5개 (초급)</option>
                        <option value="12" selected>12개 (중급)</option>
                    </select>
                </div>
                <div class="option-item" style="margin-top:10px;"><label>⏳ 장기 기억 대기</label>
                    <select id="dTime" style="width:100%"><option value="5">5초(테스트)</option><option value="1200" selected>20분</option></select>
                </div>
            </div>
            <button onclick="pressStart()">훈련 시작</button>
            <div id="main-history-list" class="history-list" style="margin-top:20px;"></div>
        </div>

        <div id="step-ready" class="hidden"><div id="countdown">3</div></div>
        <div id="step-speak" class="hidden">
            <div id="speak-idx" style="font-size:1.5rem; font-weight:bold; color:#e03131;">1 / 12</div>
            <div style="font-size: 5rem; margin: 20px;">📢</div>
            <p>잘 듣고 기억하세요!</p>
        </div>

        <div id="step-input" class="hidden">
            <div id="input-title" class="round-badge">제 1라운드</div>
            <button id="mic-btn" class="btn-mic" onclick="toggleMic()">🎤 음성 인식 시작</button>
            <textarea id="u-input" placeholder="기억나는 단어를 입력하세요..."></textarea>
            <button class="btn-next" onclick="pressNext()">확인</button>
        </div>

        <div id="step-wait" class="hidden">
            <p>☕ 장기 기억 형성 중...</p>
            <div id="wait-timer" style="font-size: 4rem; font-weight: bold; color: #228be6;">00:00</div>
            <button class="btn-cancel" onclick="skipWait()">바로 테스트</button>
        </div>

        <div id="step-recognition" class="hidden">
            <div class="round-badge" style="background:#d0ebff; color:#1864ab;">최종 확인: 단어 고르기</div>
            <p>방금 나온 단어들을 24개 중에서 골라보세요!</p>
            <div id="word-pool" class="word-grid"></div>
            <button class="btn-next" onclick="submitRecognition()">최종 결과 보기</button>
        </div>

        <div id="step-result" class="hidden">
            <h2>🎊 훈련 결과</h2>
            <div id="round-scores" class="score-summary"></div>
            <div id="answer-list" style="text-align: left; background:#f8f9fa; padding:15px; border-radius:10px; line-height:2; font-size: 0.9rem;"></div>
            <button style="margin-top:20px;" onclick="location.reload()">다시 하기</button>
        </div>
    </div>
</div>

    function goToInputPhase() {
        showScreen('step-input'); document.getElementById('u-input').value = "";
        document.getElementById('input-title').innerText = currentRound <= 3 ? `제 ${currentRound} 라운드` : "최종 장기 기억 회상";
    }

    function pressNext() {
        const userWords = document.getElementById('u-input').value.split(/[\s,]+/).filter(w => w.trim().length > 0);
        let s = 0; targetWords.forEach(tw => { if(userWords.includes(tw)) s++; });
        if (currentRound <= 3) {
            roundScores.push(s);
            if (currentRound < 3) { currentRound++; pressStart(); } 
            else { currentRound = 4; startWaitingMode(); }
        } else {
            recognitionScore = s; 
            startRecognitionPhase();
        }
    }

    function startRecognitionPhase() {
        showScreen('step-recognition');
        selectedRecogWords = [];
        let distractors = wordDB.filter(w => !targetWords.includes(w)).sort(() => Math.random() - 0.5).slice(0, 24 - targetWords.length);
        let pool = [...targetWords, ...distractors].sort(() => Math.random() - 0.5);
        const poolEl = document.getElementById('word-pool');
        poolEl.innerHTML = "";
        pool.forEach(word => {
            const tile = document.createElement('div');
            tile.className = 'word-tile';
            tile.innerText = word;
            tile.onclick = () => {
                tile.classList.toggle('selected');
                if(tile.classList.contains('selected')) selectedRecogWords.push(word);
                else selectedRecogWords = selectedRecogWords.filter(w => w !== word);
            };
            poolEl.appendChild(tile);
        });
    }

    function submitRecognition() {
        let correctPick = 0;
        selectedRecogWords.forEach(w => { if(targetWords.includes(w)) correctPick++; });
        finishTraining(recognitionScore, correctPick);
    }

    function finishTraining(longTermScore, recogScore) {
        let sumHtml = "<strong>📊 훈련 요약</strong><br>";
        roundScores.forEach((s, i) => { sumHtml += `${i+1}회차: ${s}/${targetWords.length}<br>`; });
        sumHtml += `<br><span style="color:#228be6;">장기 기억: ${longTermScore}/${targetWords.length}</span><br>`;
        sumHtml += `<span style="color:#40c057;">단어 찾기: ${recogScore}/${targetWords.length}</span>`;
        let ansHtml = "<strong>🎯 이번 정답</strong><br>";
        targetWords.forEach(tw => { ansHtml += `<span>${tw}</span> `; });
        showScreen('step-result');
        document.getElementById('round-scores').innerHTML = sumHtml;
        document.getElementById('answer-list').innerHTML = ansHtml;
        const now = new Date();
        const record = { date: `${now.getMonth()+1}/${now.getDate()}`, scores: [...roundScores], final: longTermScore, total: targetWords.length };
        history.unshift(record);
        localStorage.setItem('memoryTrainHistory', JSON.stringify(history.slice(0, 50)));
        renderHistoryList();
    }

    function startWaitingMode() {
        showScreen('step-wait');
        let tl = config.delay;
        waitInterval = setInterval(() => {
            let m = Math.floor(tl / 60), s = tl % 60;
            document.getElementById('wait-timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(tl <= 0) { clearInterval(waitInterval); goToInputPhase(); }
            tl--;
        }, 1000);
    }
    function skipWait() { clearInterval(waitInterval); goToInputPhase(); }
    function updateVol(v) { config.vol = parseFloat(v); }
    function renderHistoryList() {
        const listEl = document.getElementById('main-history-list');
        if(history.length === 0) { listEl.innerHTML = ""; return; }
        listEl.innerHTML = "<div style='font-weight:bold; margin-bottom:5px;'>📜 최근 기록</div>" + history.slice(0,10).map(h => `<div class="history-item"><div>${h.date}</div><div>${h.scores.join('→')} (최종:${h.final})</div></div>`).join('');
    }
    window.onload = () => { history = JSON.parse(localStorage.getItem('memoryTrainHistory') || "[]"); renderHistoryList(); };

    if (Recognition) {
        recognition = new Recognition(); recognition.lang = 'ko-KR'; recognition.continuous = true;
        recognition.onresult = (e) => { document.getElementById('u-input').value += e.results[e.results.length - 1][0].transcript + " "; };
        recognition.onend = () => { if(isRecording) recognition.start(); };
    }
    function toggleMic() {
        if (!recognition) return alert("지원불가 브라우저");
        isRecording = !isRecording;
        const btn = document.getElementById('mic-btn');
        if (isRecording) { recognition.start(); btn.classList.add('recording'); btn.innerText = "🎙️ 듣고 있습니다..."; } 
        else { recognition.stop(); btn.classList.remove('recording'); btn.innerText = "🎤 음성 인식 시작"; }
    }
</script>
</body>
</html>
