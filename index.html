<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 기억력 테스트</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        p {
            margin-bottom: 20px;
            color: #666;
            line-height: 1.5;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .word-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2e7d32;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
            border: 2px dashed #a5d6a7;
            border-radius: 8px;
            background-color: #f1f8e9;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tag {
            background-color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .tag.correct {
            background-color: #c8e6c9;
            color: #2e7d32;
        }
        .tag.missed {
            background-color: #ffcdd2;
            color: #c62828;
        }
        .hidden {
            display: none;
        }
        .progress {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }
        .result-summary {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 시작 화면 -->
    <div id="screen-start">
        <h1>단어 기억력 테스트</h1>
        <p>화면에 차례대로 나타나는 <strong>12개 단어</strong>를 잘 기억해 보세요.<br>(단어는 각각 2초 동안 표시됩니다)</p>
        <button class="btn" onclick="startTest()">테스트 시작</button>
    </div>

    <!-- 2. 단어 암기 화면 -->
    <div id="screen-memorize" class="hidden">
        <div class="progress" id="memorize-progress">1 / 12</div>
        <div class="word-display" id="word-display">단어</div>
    </div>

    <!-- 3. 단어 회상(입력) 화면 -->
    <div id="screen-recall" class="hidden">
        <h1>기억나는 단어를 입력하세요</h1>
        <p>생각나는 단어를 하나씩 입력하고 엔터를 누르세요.</p>
        <div class="input-group">
            <input type="text" id="word-input" placeholder="단어 입력..." onkeydown="handleKeyPress(event)">
            <button class="btn" onclick="submitWord()">입력</button>
        </div>
        <div class="word-list" id="entered-words"></div>
        <button class="btn" style="background-color: #e74c3c;" onclick="finishRecall()">입력 완료</button>
    </div>

    <!-- 4. 결과 화면 -->
    <div id="screen-result" class="hidden">
        <h1>테스트 결과</h1>
        <div class="result-summary" id="result-summary">12개 중 0개 맞춤</div>
        
        <h3>제시된 단어 목록</h3>
        <div class="word-list" id="final-word-list"></div>

        <button class="btn" onclick="resetTest()">다시 시도하기</button>
    </div>
</div>

<script>
    // 카테고리별 단어 DB
    const categorizedWordDB = {
        '꽃': ['장미', '해바라기', '튤립', '무궁화', '백합', '진달래', '개나리', '국화', '수국'],
        '주방기구': ['냄비', '프라이팬', '뒤집개', '도마', '국자', '식도', '믹서기', '전자레인지', '에어프라이어'],
        '문구': ['연필', '지우개', '볼펜', '자', '가위', '풀', '필통', '공책', '형광펜'],
        '동물': ['사자', '호랑이', '코끼리', '기린', '토끼', '강아지', '고양이', '얼룩말', '곰'],
        '과일': ['사과', '바나나', '포도', '딸기', '수박', '복숭아', '오렌지', '참외', '자두'],
        '가구': ['침대', '책상', '의자', '옷장', '소파', '식탁', '화장대', '책장', '수납장'],
        '채소': ['당근', '양파', '오이', '시금치', '마늘', '감자', '고구마', '배추', '무'],
        '교통수단': ['비행기', '자전거', '자동차', '기차', '지하철', '오토바이', '버스', '배', '택시']
    };

    let targetWords = [];
    let userWords = [];
    let currentIndex = 0;
    let memorizeTimer = null;

    // 배열 섞기 함수 (Fisher-Yates)
    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    // 조건에 맞는 12개 단어 추출 함수
    function generateRandomTargetWords() {
        let selectedWords = [];

        // 1. 필수 카테고리 3개 (꽃, 주방기구, 문구)에서 각 3개씩 추출
        const fixedCategories = ['꽃', '주방기구', '문구'];
        fixedCategories.forEach(cat => {
            if (categorizedWordDB[cat]) {
                const words = shuffleArray([...categorizedWordDB[cat]]).slice(0, 3);
                selectedWords.push(...words);
            }
        });

        // 2. 남은 카테고리 중 무작위 1개 선택 후 3개 추출
        const remainingCategories = Object.keys(categorizedWordDB).filter(cat => !fixedCategories.includes(cat));
        const randomCat = shuffleArray(remainingCategories)[0];
        if (randomCat && categorizedWordDB[randomCat]) {
            const words = shuffleArray([...categorizedWordDB[randomCat]]).slice(0, 3);
            selectedWords.push(...words);
        }

        // 3. 순서를 무작위로 섞음
        return shuffleArray(selectedWords);
    }

    // 화면 전환 함수
    function showScreen(screenId) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
    }

    // 테스트 시작
    function startTest() {
        targetWords = generateRandomTargetWords();
        userWords = [];
        currentIndex = 0;

        showScreen('screen-memorize');
        displayNextWord();
    }

    // 암기 단어 표시
    function displayNextWord() {
        if (currentIndex < targetWords.length) {
            document.getElementById('memorize-progress').innerText = `${currentIndex + 1} / ${targetWords.length}`;
            document.getElementById('word-display').innerText = targetWords[currentIndex];
            currentIndex++;
            memorizeTimer = setTimeout(displayNextWord, 2000); // 2초 후 다음 단어
        } else {
            showScreen('screen-recall');
            document.getElementById('word-input').focus();
        }
    }

    // 단어 입력 처리
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            submitWord();
        }
    }

    function submitWord() {
        const input = document.getElementById('word-input');
        const word = input.value.trim();

        if (word && !userWords.includes(word)) {
            userWords.push(word);
            renderEnteredWords();
        }
        input.value = '';
        input.focus();
    }

    // 입력한 단어 태그로 표시
    function renderEnteredWords() {
        const container = document.getElementById('entered-words');
        container.innerHTML = userWords.map(w => `<span class="tag">${w}</span>`).join('');
    }

    // 입력 완료 및 결과 표시
    function finishRecall() {
        showScreen('screen-result');

        let correctCount = 0;
        const resultList = document.getElementById('final-word-list');
        resultList.innerHTML = '';

        targetWords.forEach(word => {
            const tag = document.createElement('span');
            tag.classList.add('tag');

            if (userWords.includes(word)) {
                tag.classList.add('correct');
                tag.innerText = `✓ ${word}`;
                correctCount++;
            } else {
                tag.classList.add('missed');
                tag.innerText = `✗ ${word}`;
            }
            resultList.appendChild(tag);
        });

        document.getElementById('result-summary').innerText = `총 ${targetWords.length}개 중 ${correctCount}개 맞춤!`;
    }

    // 리셋
    function resetTest() {
        clearTimeout(memorizeTimer);
        document.getElementById('entered-words').innerHTML = '';
        document.getElementById('word-input').value = '';
        showScreen('screen-start');
    }
</script>

</body>
</html>
